spring.application.name=notification-service
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# H2 Database for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Mail Configuration (Required for Tests)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test-email@gmail.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio Configuration (Required for Tests)
twilio.account_sid=test_sid
twilio.auth_token=test_token
twilio.phone_number=test_number
